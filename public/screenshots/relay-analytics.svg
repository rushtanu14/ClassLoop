<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Relay teacher analytics screenshot</title>
  <desc id="desc">A Relay analytics view with participation, quiet students, overdue work, and follow-up status.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0f172a" flood-opacity=".15"/></filter></defs>
  <rect width="1440" height="960" rx="42" fill="url(#bg)"/>
  <rect x="86" y="78" width="1268" height="804" rx="34" fill="#fff" filter="url(#shadow)"/>
  <text x="150" y="150" font-family="Inter,Arial" font-size="34" font-weight="850" fill="#0f172a">Class follow-through report</text>
  <text x="150" y="188" font-family="Inter,Arial" font-size="17" fill="#64748b">Private teacher analytics for attendance, participation, and overdue follow-up.</text>
  <g font-family="Inter,Arial">
    <rect x="150" y="238" width="250" height="150" rx="22" fill="#ecfdf5" stroke="#bbf7d0"/><text x="182" y="290" font-size="46" font-weight="900" fill="#0f766e">78%</text><text x="182" y="334" font-size="16" font-weight="800" fill="#065f46">submitted check-in</text>
    <rect x="430" y="238" width="250" height="150" rx="22" fill="#f8fafc" stroke="#dbe7e4"/><text x="462" y="290" font-size="46" font-weight="900" fill="#0f172a">4</text><text x="462" y="334" font-size="16" font-weight="800" fill="#475569">quiet students to review</text>
    <rect x="710" y="238" width="250" height="150" rx="22" fill="#fff7ed" stroke="#fed7aa"/><text x="742" y="290" font-size="46" font-weight="900" fill="#c2410c">3</text><text x="742" y="334" font-size="16" font-weight="800" fill="#9a3412">overdue tasks</text>
    <rect x="990" y="238" width="250" height="150" rx="22" fill="#eff6ff" stroke="#bfdbfe"/><text x="1022" y="290" font-size="46" font-weight="900" fill="#1d4ed8">2</text><text x="1022" y="334" font-size="16" font-weight="800" fill="#1e3a8a">resources opened</text>
  </g>
  <rect x="150" y="438" width="620" height="300" rx="26" fill="#f8fafc" stroke="#dbe7e4"/>
  <text x="188" y="492" font-family="Inter,Arial" font-size="23" font-weight="850" fill="#0f172a">Participation distribution</text>
  <g fill="#10b981"><rect x="200" y="648" width="56" height="52" rx="12"/><rect x="284" y="586" width="56" height="114" rx="12"/><rect x="368" y="548" width="56" height="152" rx="12"/><rect x="452" y="610" width="56" height="90" rx="12"/><rect x="536" y="520" width="56" height="180" rx="12"/><rect x="620" y="570" width="56" height="130" rx="12"/></g>
  <rect x="814" y="438" width="426" height="300" rx="26" fill="#f8fafc" stroke="#dbe7e4"/>
  <text x="852" y="492" font-family="Inter,Arial" font-size="23" font-weight="850" fill="#0f172a">Teacher attention queue</text>
  <g font-family="Inter,Arial" font-size="16" fill="#334155">
    <rect x="852" y="530" width="348" height="48" rx="14" fill="#fff" stroke="#dbe7e4"/><text x="874" y="560">Marcus — missing exit ticket</text>
    <rect x="852" y="596" width="348" height="48" rx="14" fill="#fff" stroke="#dbe7e4"/><text x="874" y="626">Aaliyah — asked for doc format</text>
    <rect x="852" y="662" width="348" height="48" rx="14" fill="#fff" stroke="#dbe7e4"/><text x="874" y="692">Quiet students — check roster notes</text>
  </g>
  <text x="150" y="814" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#0f766e">Analytics stay teacher-only and are framed as support signals, not public rankings.</text>
</svg>
